volumes:
  pgData:

services:
  postgres:
    image: postgres:16.4-alpine3.20
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student666
      POSTGRES_DB: livefit
      TZ: Asia/Taipei
      PGTZ: Asia/Taipei
    volumes:
      - pgData:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student -d livefit"]
      interval: 5s
      timeout: 3s
      retries: 10
