services:
  postgres:
    image: postgres:16.4-alpine3.20
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student666
      POSTGRES_DB: school
      TZ: Asia/Taipei
      PGTZ: Asia/Taipei
    ports:
      - "${DB_PORT:-5433}:5432"

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    environment:
      SWAGGER_JSON: /openapi.yaml
    volumes:
      - ./openapi.yaml:/openapi.yaml:ro
    ports:
      - "8081:8080"
