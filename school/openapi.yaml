openapi: 3.0.3
info:
  title: 校園成績系統 API
  version: 1.0.0
  description: |
    W8 考場的 API 合約。**回應裡出現的欄位名就是合約**——你的資料表怎麼設計、
    叫什麼名字、用什麼型別，全是你的自由；但 API 回應的形狀必須跟這份文件一致。

    所有 `id` 的型別不限（uuid 或數字都可以）——以你的 API 實際回傳值為準，
    測試會「收割」你回的 id 再拿去打後續的 API。
servers:
  - url: http://localhost:3000
paths:
  /api/classes:
    get:
      summary: 列出所有班級（示範 1，老師已寫好）
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                - { id: 1, name: "忠班" }
                - { id: 2, name: "孝班" }
  /api/teachers:
    get:
      summary: 列出所有老師與教的科目（示範 2，老師已寫好）
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                - { id: 1, name: "王老師", subjects: ["數學"] }
                - { id: 2, name: "林老師", subjects: ["英文"] }
  /api/teachers/{id}:
    get:
      summary: 單一老師教學概況（示範 3，老師已寫好——findOne + 404 + 巢狀 relations 的範本）
      parameters: [{ name: id, in: path, required: true, schema: {} }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              example: { id: 1, name: "王老師", subjects: [{ id: 1, name: "數學", gradeCount: 4 }] }
        '404':
          description: 查無此老師
          content: { application/json: { example: { message: "查無此老師" } } }
  /api/classes/{id}/students:
    get:
      summary: 某班的學生名單（TODO 1）
      parameters: [{ name: id, in: path, required: true, schema: {} }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                - { id: 3, name: "小明" }
                - { id: 4, name: "小華" }
        '404':
          description: 查無此班級
          content: { application/json: { example: { message: "查無此班級" } } }
  /api/students/{id}:
    get:
      summary: 學生基本資料（TODO 2）
      parameters: [{ name: id, in: path, required: true, schema: {} }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              example: { id: 3, name: "小明", className: "忠班" }
        '404':
          description: 查無此學生
          content: { application/json: { example: { message: "查無此學生" } } }
  /api/students/{id}/report:
    get:
      summary: 學生成績單（TODO 3）
      description: 每筆成績帶自己的 id；沒補考的 retake_score 一律是 null。
      parameters: [{ name: id, in: path, required: true, schema: {} }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                id: 6
                name: "阿強"
                className: "孝班"
                grades:
                  - { id: 7, subject: "數學", score: 57, retake_score: 71 }
        '404':
          description: 查無此學生
          content: { application/json: { example: { message: "查無此學生" } } }
  /api/grades:
    post:
      summary: 補登成績（TODO 4）
      requestBody:
        content:
          application/json:
            example: { studentId: 6, subjectId: 2, score: 65 }
      responses:
        '201':
          description: 建立成功（回應必含新成績的 id）
          content: { application/json: { example: { id: 8, score: 65 } } }
        '400':
          description: 分數格式錯誤（不是 0~100 的數字）
          content: { application/json: { example: { message: "分數格式錯誤" } } }
        '404':
          description: 學生或科目不存在
          content: { application/json: { example: { message: "查無學生或科目" } } }
  /api/grades/{id}/retake:
    patch:
      summary: 補考登分（TODO 5——用到你演進 migration 加的欄位）
      parameters: [{ name: id, in: path, required: true, schema: {} }]
      requestBody:
        content: { application/json: { example: { retake_score: 78 } } }
      responses:
        '200':
          description: OK
          content: { application/json: { example: { id: 8, score: 65, retake_score: 78 } } }
        '404':
          description: 查無此成績
          content: { application/json: { example: { message: "查無此成績" } } }
  /api/classes/{id}/summary:
    get:
      summary: 班級成績摘要（TODO 6）
      description: 有補考的成績以「補考分數」計入平均；平均一律是整數（JSON number）。
      parameters: [{ name: id, in: path, required: true, schema: {} }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                class: "孝班"
                averages:
                  - { subject: "數學", average: 76 }
                  - { subject: "英文", average: 88 }
        '404':
          description: 查無此班級
          content: { application/json: { example: { message: "查無此班級" } } }
