name: W8 作業驗收

on:
  push:
    branches: [main]
  workflow_dispatch:

# 一份作業，兩關：練習場（健身房）+ 考場（學校成績系統）。兩個 job 都綠才算過。
jobs:
  livefit:
    name: 第一關·練習場驗收（健身房）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: livefit
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: livefit/package.json

      - name: 考卷完整性
        working-directory: .
        run: shasum -a 256 -c .github/checksums.txt

      - name: 安裝依賴
        run: npm install

      - name: 起資料庫
        run: |
          cp .env.example .env
          docker compose up -d postgres
          node scripts/wait-db.js

      - name: 執行你的 migrations
        run: npm run migration:run

      - name: 執行你的 seeder
        run: npm run seed

      - name: 跑行為驗收
        run: npx jest --runInBand --json --outputFile=jest-result.json

      - name: 📊 驗收結果總表
        if: always()
        working-directory: .
        run: node .github/scripts/summary.js "第一關·練習場（健身房）" livefit/jest-result.json

      - name: 🧬 演進探針（revert 要乾淨、up/down 要對稱）
        run: node scripts/verify-evolution.js

  school:
    name: 第二關·考場驗收（學校成績系統）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: school
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: school/package.json

      - name: 考卷完整性
        working-directory: .
        run: shasum -a 256 -c .github/checksums.txt

      - name: 安裝依賴
        run: npm install

      - name: 起資料庫
        run: |
          cp .env.example .env
          docker compose up -d postgres
          node scripts/wait-db.js

      - name: 執行你的 migrations
        run: npm run migration:run

      - name: 執行你的 seeder
        run: npm run seed

      - name: 跑行為驗收
        run: npx jest --runInBand --json --outputFile=jest-result.json

      - name: 📊 驗收結果總表
        if: always()
        working-directory: .
        run: node .github/scripts/summary.js "第二關·考場（學校成績系統）" school/jest-result.json
