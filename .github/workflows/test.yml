name: 考場驗收

on:
  push:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: school

jobs:
  school:
    name: 校園成績系統驗收
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: school/package.json

      - name: 考卷完整性
        working-directory: .
        run: shasum -a 256 -c .github/checksums.txt

      - name: 安裝依賴
        run: npm install

      - name: 起資料庫
        run: |
          cp .env.example .env
          docker compose up -d postgres
          node scripts/wait-db.js

      - name: 執行你的 migrations
        run: npm run migration:run

      - name: 執行你的 seeder
        run: npm run seed

      - name: 跑行為驗收
        run: npx jest --runInBand --json --outputFile=jest-result.json

      - name: 📊 驗收結果總表
        if: always()
        working-directory: .
        run: node .github/scripts/summary.js "考場驗收" school/jest-result.json

      - name: 🧬 演進探針（revert 要乾淨、up/down 要對稱）
        run: node scripts/verify-evolution.js
